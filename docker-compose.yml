services:
  # Proxy รันบน Docker (เหมาะกับ Coolify)
  smlairouter:
    build: .
    container_name: smlairouter
    restart: unless-stopped
    ports:
      - "8900:8900"   # AI Proxy (OpenAI-compatible)
    volumes:
      - ./providers.json:/app/providers.json:ro
      - ./data:/app/data
      # ถ้าต้องการใช้ไฟล์ key แทน env ให้สร้างไฟล์นี้แล้วค่อย uncomment
      # - ./api_keys.json:/app/api_keys.json:ro
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Bangkok
      # แนะนำตั้งเป็นโดเมน frontend จริง เช่น https://chat.example.com
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      # ถ้าตั้งค่า token นี้ admin endpoints จะต้องส่ง header X-Proxy-Admin-Token
      - PROXY_ADMIN_TOKEN=${PROXY_ADMIN_TOKEN:-}

      # Provider Keys (แนะนำใช้ env บน Coolify)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8900/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # OpenClaw Chat — ใช้ SML AI Router Proxy (optional)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: smlairouter-openclaw
    restart: unless-stopped
    ports:
      - "18790:18789"
    volumes:
      - ./openclaw-test:/home/node/.openclaw
    environment:
      - HOME=/home/node
      - TZ=Asia/Bangkok
      - FINDFREEAI_API_KEY=any
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    depends_on:
      - smlairouter
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# Dashboard รันแยกได้ (python app.py) ถ้าต้องการใช้งาน UI