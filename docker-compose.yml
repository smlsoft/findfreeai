services:
  # Proxy รันบน Docker
  findfreeai-proxy:
    build: .
    container_name: findfreeai-proxy
    restart: unless-stopped
    ports:
      - "8900:8900"   # AI Proxy (OpenAI-compatible)
    volumes:
      - ./api_keys.json:/app/api_keys.json
      - ./providers.json:/app/providers.json
      - ./data:/app/data
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8900/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # OpenClaw Chat — ใช้ FindFreeAI Proxy (port 18790)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: findfreeai-openclaw
    restart: unless-stopped
    ports:
      - "18790:18789"
    volumes:
      - ./openclaw-test:/home/node/.openclaw
    environment:
      - HOME=/home/node
      - TZ=Asia/Bangkok
      - FINDFREEAI_API_KEY=any
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789"]
    depends_on:
      - findfreeai-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# Dashboard รันบน host (python app.py)
# คำสั่ง: python app.py
