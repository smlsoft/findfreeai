services:
  # Proxy รันบน Docker — ไม่ใช้ Claude CLI
  findfreeai-proxy:
    build: .
    container_name: findfreeai-proxy
    restart: unless-stopped
    ports:
      - "8900:8900"   # AI Proxy (OpenAI-compatible)
    volumes:
      - ./api_keys.json:/app/api_keys.json
      - ./providers.json:/app/providers.json
      - ./data:/app/data
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8900/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Dashboard รันบน host (python app.py) เพื่อใช้ Claude CLI
# คำสั่ง: python app.py
